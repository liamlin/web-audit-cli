<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Audit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-12">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Web Audit</h1>
      <p class="text-gray-500 mt-1">SEO, Performance &amp; Security Analysis</p>
      <p id="app-version" class="text-gray-400 text-xs mt-1 hidden"></p>
    </div>

    <!-- Form View -->
    <div id="form-view">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="space-y-5">
          <!-- URL -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">URL</label>
            <input id="url-input" type="url" placeholder="https://example.com"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
            <p id="url-error" class="text-red-500 text-sm mt-1 hidden"></p>
          </div>

          <!-- Modules -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Modules</label>
            <div class="flex flex-wrap gap-3">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="seo" checked class="module-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                <span class="text-sm">SEO</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="performance" checked class="module-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                <span class="text-sm">Performance</span>
              </label>
              <label id="security-option" class="flex items-center gap-2 cursor-pointer hidden">
                <input type="checkbox" value="security" checked class="module-checkbox rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                <span class="text-sm">Security</span>
              </label>
            </div>
          </div>

          <!-- Settings row -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Language</label>
              <select id="language-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="en">English</option>
                <option value="zh-TW">繁體中文</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Performance Mode</label>
              <select id="perf-mode-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="desktop">Desktop</option>
                <option value="mobile-4g">Mobile (4G)</option>
              </select>
            </div>
          </div>

          <!-- Parallel mode -->
          <div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="parallel-checkbox" type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
              <span class="text-sm font-medium text-gray-700">Run modules in parallel</span>
              <span class="text-xs text-gray-400">(faster, but uses more resources)</span>
            </label>
          </div>

          <!-- Submit -->
          <button id="start-btn"
            class="w-full py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Start Audit
          </button>
        </div>
      </div>
    </div>

    <!-- Progress View -->
    <div id="progress-view" class="hidden">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-semibold text-gray-900">Audit in Progress</h2>
          <span id="elapsed-time" class="text-sm text-gray-500 font-mono">0:00</span>
        </div>
        <div id="module-progress" class="space-y-4"></div>
      </div>
    </div>

    <!-- Results View -->
    <div id="results-view" class="hidden">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-gray-900">Audit Complete</h2>
        </div>
        <div id="result-summary" class="grid grid-cols-2 gap-4 mb-4"></div>
        <div class="flex gap-3">
          <a id="report-link" target="_blank"
            class="flex-1 text-center py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors no-underline">
            View Report
          </a>
          <a id="pdf-link"
            class="flex-1 text-center py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition-colors no-underline">
            Download PDF
          </a>
          <a id="json-link"
            class="flex-1 text-center py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition-colors no-underline">
            Download JSON
          </a>
        </div>
      </div>
      <button id="new-audit-btn"
        class="w-full py-2.5 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors">
        New Audit
      </button>
    </div>

    <!-- Error View -->
    <div id="error-view" class="hidden">
      <div class="bg-red-50 border border-red-200 rounded-xl p-6">
        <h2 class="text-lg font-semibold text-red-800 mb-2">Audit Failed</h2>
        <p id="error-message" class="text-red-700 text-sm"></p>
        <button id="retry-btn"
          class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">
          Try Again
        </button>
      </div>
    </div>
  </div>

<script>
/* All DOM updates use textContent for user-supplied data (no innerHTML with untrusted input) */
(function() {
  // Detect Electron desktop mode
  if (window.electronAPI) {
    var versionEl = document.getElementById('app-version');
    if (versionEl) {
      versionEl.textContent = 'v' + window.electronAPI.getVersion();
      versionEl.classList.remove('hidden');
    }
  }

  const viewIds = { form: 'form-view', progress: 'progress-view', results: 'results-view', error: 'error-view' };
  let currentAuditId = null;
  let eventSource = null;
  let elapsedTimer = null;
  let startTime = null;

  function show(view) {
    Object.values(viewIds).forEach(function(id) { document.getElementById(id).classList.add('hidden'); });
    document.getElementById(viewIds[view]).classList.remove('hidden');
  }

  function startElapsedTimer() {
    startTime = Date.now();
    elapsedTimer = setInterval(function() {
      var s = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsed-time').textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }, 1000);
  }

  function stopElapsedTimer() {
    if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  }

  // Check health on load to determine module availability
  fetch('/api/health').then(function(r) { return r.json(); }).then(function(data) {
    if (data.securityAvailable) {
      document.getElementById('security-option').classList.remove('hidden');
    }
  }).catch(function() {});

  // Start audit
  document.getElementById('start-btn').addEventListener('click', async function() {
    var url = document.getElementById('url-input').value.trim();
    var errEl = document.getElementById('url-error');
    errEl.classList.add('hidden');

    if (!url) { errEl.textContent = 'Please enter a URL'; errEl.classList.remove('hidden'); return; }
    try { new URL(url); } catch(e) { errEl.textContent = 'Please enter a valid URL'; errEl.classList.remove('hidden'); return; }

    var modules = Array.from(document.querySelectorAll('.module-checkbox:checked')).map(function(cb) { return cb.value; });
    if (modules.length === 0) { errEl.textContent = 'Please select at least one module'; errEl.classList.remove('hidden'); return; }

    var btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = 'Starting...';

    try {
      var resp = await fetch('/api/audit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          url: url,
          modules: modules,
          language: document.getElementById('language-select').value,
          performanceMode: document.getElementById('perf-mode-select').value,
          crawlDepth: 30,
          parallel: document.getElementById('parallel-checkbox').checked,
        }),
      });

      var data = await resp.json();
      if (!resp.ok) {
        errEl.textContent = data.error || 'Failed to start audit';
        errEl.classList.remove('hidden');
        return;
      }

      currentAuditId = data.auditId;
      setupProgressView(modules);
      show('progress');
      startElapsedTimer();
      connectSSE(currentAuditId);
    } catch (err) {
      errEl.textContent = 'Network error: ' + err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Start Audit';
    }
  });

  function setupProgressView(modules) {
    var container = document.getElementById('module-progress');
    // Clear existing children safely
    while (container.firstChild) container.removeChild(container.firstChild);

    modules.forEach(function(mod) {
      var row = document.createElement('div');
      row.id = 'progress-' + mod;
      row.className = 'flex items-center justify-between';

      var left = document.createElement('div');
      left.className = 'flex items-center gap-2';

      var dot = document.createElement('span');
      dot.className = 'w-2 h-2 rounded-full bg-gray-300';
      dot.id = 'dot-' + mod;

      var label = document.createElement('span');
      label.className = 'text-sm font-medium text-gray-700 capitalize';
      label.textContent = mod;

      left.appendChild(dot);
      left.appendChild(label);

      var statusEl = document.createElement('span');
      statusEl.className = 'text-sm text-gray-400';
      statusEl.id = 'status-' + mod;
      statusEl.textContent = 'Queued';

      row.appendChild(left);
      row.appendChild(statusEl);
      container.appendChild(row);
    });
  }

  function connectSSE(auditId) {
    if (eventSource) eventSource.close();
    var errorCount = 0;
    var MAX_SSE_ERRORS = 3;

    eventSource = new EventSource('/api/audit/' + auditId + '/progress');

    eventSource.addEventListener('progress', function(e) {
      errorCount = 0; // reset on successful message
      var event = JSON.parse(e.data);
      updateModuleProgress(event);
    });

    eventSource.addEventListener('ping', function() {
      errorCount = 0; // keepalive received, connection is healthy
    });

    eventSource.addEventListener('done', function(e) {
      var data = JSON.parse(e.data);
      eventSource.close();
      stopElapsedTimer();
      if (data.status === 'complete') {
        showResults(auditId);
      } else {
        showError(data.error || 'Audit failed');
      }
    });

    eventSource.onerror = function() {
      errorCount++;
      if (errorCount >= MAX_SSE_ERRORS) {
        eventSource.close();
        stopElapsedTimer();
        showError('Lost connection to server. The audit may still be running — refresh the page to check.');
      }
    };
  }

  function updateModuleProgress(event) {
    if (event.module === 'system') return;
    var dot = document.getElementById('dot-' + event.module);
    var status = document.getElementById('status-' + event.module);
    if (!dot || !status) return;

    switch (event.status) {
      case 'running':
        dot.className = 'w-2 h-2 rounded-full bg-blue-500 pulse-dot';
        status.textContent = 'Running...';
        status.className = 'text-sm text-blue-600';
        break;
      case 'complete':
        dot.className = 'w-2 h-2 rounded-full bg-green-500';
        status.textContent = 'Complete';
        status.className = 'text-sm font-medium text-green-600';
        break;
      case 'partial':
        dot.className = 'w-2 h-2 rounded-full bg-yellow-500';
        status.textContent = 'Partial';
        status.className = 'text-sm text-yellow-600';
        break;
      case 'skipped':
        dot.className = 'w-2 h-2 rounded-full bg-gray-400';
        status.textContent = 'Skipped';
        status.className = 'text-sm text-gray-500';
        break;
      case 'failed':
        dot.className = 'w-2 h-2 rounded-full bg-red-500';
        status.textContent = 'Failed';
        status.className = 'text-sm text-red-600';
        break;
    }
  }

  async function showResults(auditId) {
    try {
      var resp = await fetch('/api/audit/' + auditId + '/result');
      var report = await resp.json();

      // Summary: passes + issues counts
      var summary = document.getElementById('result-summary');
      while (summary.firstChild) summary.removeChild(summary.firstChild);

      var passDiv = document.createElement('div');
      passDiv.className = 'text-center p-3 bg-green-50 rounded-lg';
      var passCount = document.createElement('div');
      passCount.className = 'text-2xl font-bold text-green-600';
      passCount.textContent = String((report.passes || []).length);
      var passLabel = document.createElement('div');
      passLabel.className = 'text-xs text-gray-500 mt-1';
      passLabel.textContent = 'Checks Passed';
      passDiv.appendChild(passCount);
      passDiv.appendChild(passLabel);

      var issueDiv = document.createElement('div');
      issueDiv.className = 'text-center p-3 bg-red-50 rounded-lg';
      var issueCount = document.createElement('div');
      issueCount.className = 'text-2xl font-bold text-red-600';
      issueCount.textContent = String((report.issues || []).length);
      var issueLabel = document.createElement('div');
      issueLabel.className = 'text-xs text-gray-500 mt-1';
      issueLabel.textContent = 'Issues Found';
      issueDiv.appendChild(issueCount);
      issueDiv.appendChild(issueLabel);

      summary.appendChild(passDiv);
      summary.appendChild(issueDiv);

      // Links
      document.getElementById('report-link').href = '/api/audit/' + auditId + '/report';
      document.getElementById('pdf-link').href = '/api/audit/' + auditId + '/pdf';
      document.getElementById('json-link').href = '/api/audit/' + auditId + '/result';

      show('results');
    } catch(e) {
      showError('Failed to load results');
    }
  }

  function showError(message) {
    document.getElementById('error-message').textContent = message;
    show('error');
  }

  document.getElementById('new-audit-btn').addEventListener('click', function() { show('form'); });
  document.getElementById('retry-btn').addEventListener('click', function() { show('form'); });
})();
</script>
</body>
</html>
